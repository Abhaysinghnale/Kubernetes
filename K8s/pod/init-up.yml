kind: Pod
apiVersion: v1
metadata:
  name: init-test
spec:
  initContainers:
  - name: init-container
    image: busybox:latest
    # Added -c and fixed the semicolon after the first echo
    command: ["sh", "-c", "echo 'Initialization started...'; sleep 10; echo 'Initialization done'"]

  # Fixed the typo here from "conatiners" to "containers"
  containers: 
  - name: main-container
    image: busybox:latest
    command: ["sh", "-c", "echo 'Main container started'"]
